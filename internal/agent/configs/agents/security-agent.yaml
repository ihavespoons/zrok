# Agent YAML schema notes (also applies to other analysis agents):
#
#   specialization.owns_cwes: list of CWE IDs this agent is authoritatively
#     responsible for filing findings against. CWEs outside this list should
#     be passed to the owning agent via a memory, not a duplicate finding.
#
#   cwe_checklist[*].detection_hints: free-text hints. Prefer concrete bad sinks
#     (e.g. `hashlib.md5`) and, where useful, concrete good sinks (e.g.
#     `bcrypt.hashpw`) on the same list so the model sees both.
#
#   cwe_checklist[*].flow_patterns: SOURCE -> GUARD -> SINK templates.
#
#   cwe_checklist[*].negative_pattern: OPTIONAL example of *correct* code for
#     this CWE class (counter-example to detection_hints). NOTE: this field is
#     captured here for reviewer reference; if you want a pattern to reliably
#     reach the model prompt, also include it in detection_hints since the
#     current renderer only emits detection_hints and flow_patterns.
#
name: security-agent
description: Reviews common security concerns - authentication, authorization, cryptography, and secrets
phase: analysis
applicability:
  project_traits:
    - has-auth
    - has-datastore
specialization:
  review_categories:
    - authentication
    - authorization
    - cryptography
    - secrets
    - session-management
    - input-validation
  owasp_categories:
    - "A01:2021"
    - "A02:2021"
    - "A07:2021"
  # owns_cwes: authoritative CWE ownership. Only file findings for these CWEs.
  # If you discover a vuln outside this list, write a memory for the right agent
  # rather than filing a finding (avoids duplicate findings across agents).
  # NOTE: CWE-614 (cookie security) was deferred to config-agent since it is a
  # configuration concern; security-agent owns the rest of A01/A02/A07.
  owns_cwes:
    - CWE-287
    - CWE-327
    - CWE-328
    - CWE-330
    - CWE-338
    - CWE-613
    - CWE-798
    - CWE-862
    - CWE-916
cwe_checklist:
  - id: CWE-287
    name: Improper Authentication
    detection_hints:
      - "Authentication bypass through missing checks on alternative paths"
      - "Default credentials or weak password policies"
    flow_patterns:
      - "SOURCE: login request -> GUARD: auth check -> SINK: session creation"
  - id: CWE-862
    name: Missing Authorization
    detection_hints:
      - "Direct object reference without ownership verification"
      - "Missing permission checks on API endpoints"
    flow_patterns:
      - "SOURCE: user request with resource ID -> GUARD: authz check -> SINK: data access"
  - id: CWE-327
    name: Use of Broken Crypto Algorithm
    detection_hints:
      - "BAD: Crypto.Cipher.DES, Crypto.Cipher.ARC4, pycryptodome DES/3DES/RC4"
      - "BAD: ssl.PROTOCOL_SSLv2/SSLv3/TLSv1, ssl.PROTOCOL_TLSv1_1"
      - "BAD: hashlib.md5/sha1 used for integrity or signing"
      - "GOOD: AES-GCM (Crypto.Cipher.AES with MODE_GCM), AES-CBC + HMAC, ChaCha20-Poly1305"
      - "GOOD: cryptography.hazmat.primitives.ciphers.aead.AESGCM / ChaCha20Poly1305"
      - "Custom cryptographic implementations of standard primitives"
    flow_patterns:
      - "SOURCE: sensitive data -> GUARD: algorithm choice -> SINK: encrypted storage/transmission"
    negative_pattern: |
      from cryptography.hazmat.primitives.ciphers.aead import AESGCM
      key = AESGCM.generate_key(bit_length=256)
      AESGCM(key).encrypt(nonce, plaintext, associated_data)
  - id: CWE-328
    name: Use of Weak Hash
    detection_hints:
      - "BAD: hashlib.md5(), hashlib.sha1(), hashlib.new('md5'), hashlib.new('sha1') for integrity, signing, or identity"
      - "BAD: MD5/SHA1 hex digests used as security tokens or de-duplication keys for security purposes"
      - "GOOD: hashlib.sha256 / sha512 / blake2b for general-purpose hashing"
    flow_patterns:
      - "SOURCE: sensitive data -> GUARD: hash algorithm choice -> SINK: integrity check / signature"
    negative_pattern: |
      import hashlib
      digest = hashlib.sha256(data).hexdigest()
  - id: CWE-798
    name: Use of Hard-coded Credentials
    detection_hints:
      - "BAD: hard-coded passwords, API keys, tokens, AWS secret keys, JWT secrets in source"
      - "BAD: connection strings like 'postgres://user:password@host/db' with literal credentials"
      - "BAD: assignment patterns like `API_KEY = \"sk-...\"`, `password = \"admin123\"`"
      - "GOOD: os.environ['SECRET'], os.getenv('SECRET'), boto3 secrets manager, HashiCorp Vault clients"
      - "GOOD: secrets loaded from .env via python-dotenv at startup, never committed"
    flow_patterns:
      - "SOURCE: hardcoded string -> SINK: authentication call or config"
    negative_pattern: |
      import os
      api_key = os.environ["STRIPE_API_KEY"]  # injected by deployment, never literal
  - id: CWE-613
    name: Insufficient Session Expiration
    detection_hints:
      - "Sessions that never expire or have excessively long timeouts (>24h for sensitive apps)"
      - "Missing session invalidation on logout or password change"
      - "BAD: PERMANENT_SESSION_LIFETIME unset in Flask, SESSION_COOKIE_AGE = None / very large in Django"
    flow_patterns:
      - "SOURCE: session creation -> GUARD: expiry check -> SINK: session validation"
  - id: CWE-916
    name: Use of Password Hash With Insufficient Effort
    detection_hints:
      - "BAD: hashlib.md5(password), hashlib.sha1(password), hashlib.sha256(password) used directly to store passwords"
      - "BAD: hashlib.new('md5', password), hashlib.new('sha1', password)"
      - "BAD: unsalted hashes or static/global salts"
      - "GOOD: bcrypt.hashpw(password, bcrypt.gensalt())"
      - "GOOD: argon2.PasswordHasher().hash(password) (argon2-cffi)"
      - "GOOD: passlib.hash.argon2.hash(password) / passlib.hash.bcrypt.hash(password)"
      - "GOOD: hashlib.scrypt or hashlib.pbkdf2_hmac with high iteration count (>=600k for SHA-256)"
    flow_patterns:
      - "SOURCE: user password -> GUARD: hashing algorithm -> SINK: password storage"
    negative_pattern: |
      from argon2 import PasswordHasher
      ph = PasswordHasher()
      stored = ph.hash(user_password)
  - id: CWE-338
    name: Use of Cryptographically Weak PRNG
    detection_hints:
      - "BAD: random.random(), random.randint(), random.choice(), random.normalvariate(), random.uniform()"
      - "BAD: random.SystemRandom is fine but plain `random` module functions are NOT for tokens/keys/IDs"
      - "BAD: numpy.random.* used to generate security-relevant values"
      - "GOOD: secrets.token_hex(n), secrets.token_urlsafe(n), secrets.token_bytes(n)"
      - "GOOD: secrets.choice(alphabet), secrets.randbelow(n)"
      - "GOOD: os.urandom(n) for raw bytes"
    flow_patterns:
      - "SOURCE: random module call -> SINK: token / key / session ID / password reset link"
    negative_pattern: |
      import secrets
      reset_token = secrets.token_urlsafe(32)
  - id: CWE-330
    name: Use of Insufficiently Random Values
    detection_hints:
      - "BAD: timestamp-based IDs/tokens (time.time(), datetime.now().isoformat()) for security values"
      - "BAD: uuid.uuid1() (MAC + timestamp, predictable); also random.random/randint/choice as in CWE-338"
      - "GOOD: uuid.uuid4() (random), secrets.token_*, os.urandom()"
    flow_patterns:
      - "SOURCE: weak randomness source -> SINK: session ID / nonce / IV / salt"
    negative_pattern: |
      import secrets
      nonce = secrets.token_bytes(16)
tools_allowed:
  - read
  - search
  - symbols
  - memory
  - finding
  - think
  - semantic
context_memories:
  - project_overview
  - auth_patterns
  - api_endpoints
prompt_template: |
  You are a security analyst focused on common security concerns that repeatedly cause issues.

  ## Your Focus Areas (Repeat Offenders)

  ### Authentication
  - How are users identified and verified?
  - Is authentication consistent across all entry points?
  - Are there authentication bypass risks?
  - Is session management secure?
  - Is MFA implemented where appropriate?
  - Are password requirements enforced?

  ### Authorization
  - How are permissions checked?
  - Is there consistent authorization enforcement?
  - Are there IDOR (Insecure Direct Object Reference) risks?
  - Is the principle of least privilege followed?
  - Are admin functions properly protected?
  - Is there role-based or attribute-based access control?

  ### Cryptography
  - Are strong algorithms used (not MD5, SHA1, DES)?
  - Are key sizes appropriate?
  - Is key management handled properly?
  - Are random numbers cryptographically secure?
  - Is encryption at rest implemented where needed?
  - Is TLS configured properly?

  ### Secrets
  - Are secrets hardcoded in source?
  - How are secrets stored and accessed?
  - Are secrets rotated?
  - Are there secrets in logs, error messages, or URLs?
  - Is there a secrets management solution?
  - Are API keys scoped appropriately?

  ## Memory System

  Read shared memories with `zrok memory list` / `zrok memory read <name>`.
  No new memories are required from analysis agents. If you discover a project-wide
  pattern worth sharing (e.g. a shared sanitizer that breaks across sites), record
  it with: `zrok memory write <name> --type pattern --content '...'`.

  ### Your Context Memories
  {{range $name, $content := .Memories}}
  #### {{$name}}
  {{$content}}
  {{end}}

  ## Tech Stack
  {{.TechStack}}

  ## Finding Ownership

  Stay strictly within your declared `owns_cwes` (shown in the Authoritative CWEs
  section above, rendered by zrok). If you discover a vuln in another agent's
  territory, write a memory referral named `<your-agent>_referrals` documenting
  the file:line and CWE for that agent to pick up — do NOT file the finding
  yourself.

  Before filing, check `zrok finding list --file <your-target-file> --json` — if another agent already filed at the same line, prefer adding to that finding's notes (`zrok finding update <ID> --note "<your perspective>"`) over creating a new finding for a different CWE on the same line.

  ## Available Tools
  {{.ToolDescriptions}}

  {{if .CWEChecklist}}
  {{.CWEChecklist}}
  {{end}}

  {{if .FlowGuidance}}
  {{.FlowGuidance}}
  {{end}}
  {{if .FewShotExamples}}
  {{.FewShotExamples}}
  {{end}}
  ## Analysis Approach
  1. Read auth_patterns and api_endpoints memories first
  2. Map authentication boundaries from those memories
  3. Trace authorization checks
  4. Review cryptographic implementations
  5. Search for hardcoded secrets
  6. Assess overall security posture
  7. Create memories for security patterns discovered

  ## Reporting
  Create findings with category tags:
  - security:authentication
  - security:authorization
  - security:cryptography
  - security:secrets
  - security:session
