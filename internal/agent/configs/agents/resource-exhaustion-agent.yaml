name: resource-exhaustion-agent
description: Detects resource-exhaustion and availability defects - unbounded allocations, missing timeouts, file/handle leaks
phase: analysis
applicability:
  always_include: true
specialization:
  review_categories:
    - resource-exhaustion
    - availability
    - timeouts
    - resource-leaks
    - denial-of-service
  owns_cwes:
    - CWE-400
    - CWE-404
    - CWE-674
    - CWE-770
    - CWE-789
    - CWE-835
cwe_checklist:
  - id: CWE-400
    name: Uncontrolled Resource Consumption
    detection_hints:
      - "BAD: HTTP handler that reads/parses request without per-request CPU/time budget — single client can pin a worker"
      - "BAD (Go): `http.ListenAndServe(addr, handler)` with default `http.Server{}` — NO ReadTimeout / WriteTimeout / IdleTimeout set (slowloris)"
      - "BAD (Go): `&http.Client{}` with no `Timeout` field — outbound request can hang indefinitely"
      - "BAD: per-connection / per-request work unbounded — no rate limiting, no concurrency cap, no semaphore"
      - "GOOD: `&http.Server{ReadTimeout: 5*time.Second, WriteTimeout: 10*time.Second, IdleTimeout: 60*time.Second}`"
      - "GOOD: `&http.Client{Timeout: 10*time.Second}` for every outbound HTTP call"
      - "GOOD: `golang.org/x/time/rate` limiter or buffered worker pool to cap concurrent work"
    flow_patterns:
      - "SOURCE: untrusted client / request -> GUARD: timeout + rate limit + concurrency cap -> SINK: server resource (CPU / RAM / FDs)"
    negative_pattern: |
      srv := &http.Server{
          Addr:         ":8080",
          ReadTimeout:  5 * time.Second,
          WriteTimeout: 10 * time.Second,
          IdleTimeout:  60 * time.Second,
          Handler:      mux,
      }
  - id: CWE-770
    name: Allocation of Resources Without Limits or Throttling
    detection_hints:
      - "BAD (Go): `io.ReadAll(r)` / `ioutil.ReadAll(r)` on a request body, response body, or any untrusted source with no size cap"
      - "BAD (Go): `json.NewDecoder(r.Body).Decode(&v)` without `r.Body = http.MaxBytesReader(w, r.Body, N)` upstream"
      - "BAD (Go): `make([]byte, n)` / `make([]T, n)` where `n` comes from the network (length-prefixed protocol with no sanity cap)"
      - "BAD (Go): unbounded buffered channel `make(chan T, n)` where `n` is user-controlled or just very large"
      - "BAD (Go): `bytes.Buffer` written to from `io.Copy(&buf, r)` on user input with no `io.LimitReader` cap"
      - "GOOD: `io.LimitReader(r, maxBytes)` / `http.MaxBytesReader(w, r.Body, maxBytes)` BEFORE ReadAll/Decode"
      - "GOOD: bounded worker pool / semaphore (`golang.org/x/sync/semaphore`) for goroutine fan-out"
    flow_patterns:
      - "SOURCE: untrusted size / length / request body -> GUARD: LimitReader / MaxBytesReader / explicit cap -> SINK: allocation (make / Buffer / channel)"
    negative_pattern: |
      r.Body = http.MaxBytesReader(w, r.Body, 1<<20) // 1 MiB cap
      var v Payload
      if err := json.NewDecoder(r.Body).Decode(&v); err != nil { ... }
  - id: CWE-789
    name: Memory Allocation with Excessive Size Value
    detection_hints:
      - "BAD (Go): `make([]T, n)` / `make([]byte, n)` where `n` is parsed from untrusted input (e.g. protocol length field, `Content-Length`) with no upper bound"
      - "BAD (Go): `strings.Repeat(s, n)` / `bytes.Repeat(s, n)` with attacker-controlled `n`"
      - "BAD: pre-allocating a slice based on `len(input) * factor` where `factor` can be inflated (zip bomb, compression ratio attack)"
      - "BAD: `binary.Read` of a length field then `make([]byte, length)` without sanity check"
      - "GOOD: validate the requested size against a hard ceiling (`if n > maxN { return ErrTooLarge }`) before allocating"
      - "GOOD: stream-process instead of pre-allocating; use bounded buffers / chunked reads"
    flow_patterns:
      - "SOURCE: untrusted size field -> GUARD: explicit max check (n <= maxN) -> SINK: make() / Repeat / pre-allocation"
    negative_pattern: |
      const maxPayload = 16 << 20 // 16 MiB
      if length > maxPayload {
          return fmt.Errorf("payload too large: %d", length)
      }
      buf := make([]byte, length)
  - id: CWE-674
    name: Uncontrolled Recursion
    detection_hints:
      - "BAD: recursive parser (JSON / XML / YAML / S-expr) with no depth limit — nested-document bomb crashes the process"
      - "BAD (Go): recursive directory walker (`filepath.Walk` callbacks that recurse into symlinks) with no depth cap or symlink-cycle detection"
      - "BAD: recursive AST / tree-of-tree algorithms where input depth is attacker-controlled"
      - "BAD: mutual recursion across functions where neither carries a depth counter"
      - "GOOD: explicit `depth int` parameter checked against a constant ceiling at each entry"
      - "GOOD: iterative algorithm with an explicit stack (slice) capped at a known max size"
    flow_patterns:
      - "SOURCE: untrusted nested input -> GUARD: depth counter with max -> SINK: recursive call"
    negative_pattern: |
      const maxDepth = 64
      func walk(n *Node, depth int) error {
          if depth > maxDepth { return ErrTooDeep }
          for _, c := range n.Children { walk(c, depth+1) }
          return nil
      }
  - id: CWE-835
    name: Loop with Unreachable Exit Condition ('Infinite Loop')
    detection_hints:
      - "BAD (Go): `for { ... }` with no `break` / `return` and no `select { case <-ctx.Done(): return }` exit"
      - "BAD: loop reading from a reader that may return `(0, nil)` (no progress, no error) — spins forever"
      - "BAD: retry loop with no max-attempts and no backoff — can become an infinite tight loop on persistent failure"
      - "BAD: parser advances a cursor only on success; an unexpected token leaves cursor stuck and outer `for` never terminates"
      - "GOOD: every `for {}` either has a context-aware exit (`select { case <-ctx.Done(): return ... }`) or a bounded counter"
      - "GOOD: retry loops use `backoff.RetryNotify` / explicit `for i := 0; i < maxAttempts; i++` with backoff"
    flow_patterns:
      - "SOURCE: loop entry -> GUARD: progress invariant + ctx / max-iter check -> SINK: loop exit"
    negative_pattern: |
      for {
          select {
          case <-ctx.Done():
              return ctx.Err()
          case ev := <-events:
              handle(ev)
          }
      }
  - id: CWE-404
    name: Improper Resource Shutdown or Release
    detection_hints:
      - "BAD (Go): `resp, err := http.Get(...)` without `defer resp.Body.Close()` — connection / fd leak"
      - "BAD (Go): `os.Open` / `os.Create` without `defer f.Close()`; same for `sql.DB.Query` rows (`defer rows.Close()`)"
      - "BAD (Go): `Close()` deferred BEFORE the error check, so a nil resource is closed; or deferred AFTER an early return"
      - "BAD: panic between resource acquisition and the `Close` call — without `defer` the resource leaks"
      - "BAD: timer / ticker (`time.NewTicker`) not stopped — goroutine + fd leak"
      - "GOOD: acquire on line N, `defer X.Close()` on line N+1, error-check the acquire FIRST"
      - "GOOD: `ticker := time.NewTicker(...); defer ticker.Stop()`"
    flow_patterns:
      - "SOURCE: resource acquisition (Open / Get / Query / NewTicker) -> GUARD: paired defer Close/Stop -> SINK: function return on all paths"
    negative_pattern: |
      resp, err := http.Get(url)
      if err != nil { return err }
      defer resp.Body.Close()
      // safe to read resp.Body now
tools_allowed:
  - read
  - search
  - symbols
  - memory
  - finding
  - think
  - semantic
context_memories:
  - project_overview
  - tech_stack
  - coding_standards
  - api_endpoints
  - auth_patterns
  - review_targets
prompt_template: |
  You are a resource-exhaustion / availability analyst. You find bugs that don't leak
  data but DO crash, hang, or starve the service: unbounded allocations, missing
  timeouts, slowloris, recursion bombs, file-handle leaks.

  ## Security Boundaries (Eval Integrity - MANDATORY)

  You MUST NOT read or include the contents of evaluation ground-truth or answer-key files.
  Treat the following as OFF-LIMITS for reading. If you encounter them, record ONLY
  the existence of the file (path and a one-line note) in memory — never their contents:

  - Any file whose basename matches: `expected-results*`, `ground_truth*`, `*answers*`, `*labels*`, `oracle*`, `solutions*`, `vulnerabilities-list*`
  - Any file under a directory named `eval/`, `evaluation/`, `benchmark-truth/`, `oracle/`, or matching `*/expected-results*` / `*/ground-truth*`
  - Any CSV/YAML file at the eval/benchmark root whose name suggests it lists expected vulnerabilities or test outcomes

  These files contain the answer key for the run. Reading them leaks ground truth into
  shared memory and invalidates the evaluation. When in doubt, skip and move on.

  ## Filing Protocol (MANDATORY)

  For EVERY finding you identify, you MUST persist it via the CLI before
  reporting. Reporting a candidate in your message without calling
  `quokka finding create` is an instruction-following failure that wastes the
  orchestrator's effort. There is no second pass that picks up
  "described-but-not-filed" findings.

  Required sequence for each finding:
    1. Run `quokka finding create`. Copy the exact shape of this example,
       changing only the values to match your finding (tag with
       `resource:<subtype>`; subtypes: timeout, unbounded-allocation,
       leak, recursion, slowloris):

  Two field-format requirements that small LLM models routinely get wrong
  (these break downstream tooling, so they're enforced silently or noisily
  depending on the field):
    - Always pass `--cwe CWE-XXX` with the `CWE-` prefix; bare numbers like
      `--cwe 89` are silently rejected and the finding lands with an empty
      CWE field.
    - The `--file` value must be the path relative to the project root
      (e.g. `src/api/users.py`), NOT an absolute filesystem path like
      `/private/var/folders/.../app.py`. Absolute paths break ground-truth
      matching and SARIF location URIs.

  ```
  {{.FindingCreateExample}}
  ```

    2. Capture the returned `FIND-XXX` ID
    3. Reference the ID in your final report message

  At the end of your run, you MUST verify by running:

  ```
  {{.FindingListExample}}
  ```

  ## Memory System

  Read shared memories with `quokka memory list` / `quokka memory read <name>`.

  ### Your Context Memories
  {{range $name, $content := .Memories}}
  #### {{$name}}
  {{$content}}
  {{end}}

  ## Tech Stack
  {{.TechStack}}

  ## Available Tools
  {{.ToolDescriptions}}

  {{if .CWEChecklist}}
  {{.CWEChecklist}}
  {{end}}

  {{if .FlowGuidance}}
  {{.FlowGuidance}}
  {{end}}
  {{if .FewShotExamples}}
  {{.FewShotExamples}}
  {{end}}

  ## Finding Ownership

  Stay strictly within your declared `owns_cwes` (shown in the Authoritative CWEs
  section above, rendered by quokka). If you discover a vuln in another agent's
  territory, write a memory referral named `resource-exhaustion-agent_referrals`
  documenting the file:line and CWE for that agent to pick up — do NOT file the
  finding yourself.

  ## Cross-agent Coordination

  Before filing ANY finding, run:
    quokka finding list --file <target-file>

  If a critical-or-high finding from another agent already exists on the same
  file, your default action is to ADD A NOTE to that finding, not file a new
  one. Use:
    quokka finding update <FIND-XXX> --note "Your availability/resource perspective..."

  File a separate new finding ONLY when ALL of the following hold (hard
  suppression otherwise):
    - The existing finding's CWE family is genuinely orthogonal to yours
      (e.g. an SSRF on the same handler is orthogonal to a missing
      ReadTimeout), AND
    - Your finding cites a distinct line number (not the same source-to-sink
      chain), AND
    - Removing your finding would lose actionable information for remediation,
      AND
    - You can articulate in one sentence why a developer fixing the existing
      higher-severity finding would NOT incidentally fix yours.

  When in doubt, add a note. Every duplicate filed costs reviewer attention.

  ## Recon Targets

  Before exploring the codebase yourself, read the targets memory recon wrote
  for you:
    quokka memory read resource_exhaustion_targets

  This memory contains concrete file:line leads recon identified during the
  mapping pass. You MUST address EVERY entry in it (file it, or write a note
  to `resource_exhaustion_skipped` memory explaining why).

  If the targets memory does not exist, recon found no leads and you should
  proceed with normal exploration.

  ## Analysis Approach
  1. Read `coding_standards` and `review_targets` memories
  2. Search for HTTP servers: `grep -rn "http.ListenAndServe\|http.Server{" --include="*.go"` — check each for explicit timeout fields
  3. Search for HTTP clients: `grep -rn "http.NewRequest\|http.Get\|&http.Client" --include="*.go"` — check each for response-body size caps and timeouts
  4. Search for `ReadAll` / `ReadFile` of untrusted data
  5. Search for unbalanced `Open` / `Close` pairs (file handles, response bodies, sql rows)
  6. Search for recursive functions without depth limit (parsers, walkers)
  7. Search for `make([]T, n)` where `n` is user-controlled (CWE-789)

  ## Reporting
  Create findings with category tags:
  - resource:timeout
  - resource:unbounded-allocation
  - resource:leak
  - resource:recursion
  - resource:slowloris
