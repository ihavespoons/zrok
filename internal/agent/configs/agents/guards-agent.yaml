name: guards-agent
description: Analyzes guard conditions, validation patterns, and defensive coding practices
phase: analysis
applicability:
  always_include: true
specialization:
  review_categories:
    - frontloading-guards
    - inline-guards
    - typical-checks
    - declarations
    - early-returns
    - error-handling
  # owns_cwes: authoritative CWE ownership. Only file findings for these CWEs.
  # If you discover a vuln outside this list, write a memory for the right agent
  # rather than filing a finding (avoids duplicate findings across agents).
  owns_cwes:
    - CWE-20
    - CWE-352
    - CWE-396
    - CWE-754
cwe_checklist:
  - id: CWE-20
    name: Improper Input Validation
    detection_hints:
      - "BAD: passing request.args / request.json / request.form directly into business logic with no type/range/format checks"
      - "BAD: trusting a substring check like `if '..' not in path` for traversal defense (still bypassable)"
      - "BAD: relying on client-side validation only"
      - "GOOD: pydantic models, marshmallow schemas, or explicit type+range checks at the boundary"
    flow_patterns:
      - "SOURCE: user input -> GUARD: validation check -> SINK: business logic"
    negative_pattern: |
      from pydantic import BaseModel, conint
      class Req(BaseModel):
          page: conint(ge=0, le=10_000)
      req = Req(**request.json)  # raises on invalid; never use raw dict
  - id: CWE-352
    name: Cross-Site Request Forgery (CSRF)
    detection_hints:
      - "BAD: state-changing POST/PUT/DELETE endpoints without CSRF tokens (Flask without flask-wtf, custom auth without CSRF)"
      - "BAD: disabling CSRF middleware globally (Django @csrf_exempt sprinkled across views, MIDDLEWARE missing CsrfViewMiddleware)"
      - "BAD: cookie-based session auth + missing SameSite=Lax/Strict + no CSRF token"
      - "GOOD: Django csrf_protect / {% csrf_token %}, Flask-WTF CSRFProtect, FastAPI with double-submit token pattern"
    flow_patterns:
      - "SOURCE: cross-origin request -> GUARD: CSRF token / SameSite check -> SINK: state-changing handler"
  - id: CWE-396
    name: Declaration of Catch for Generic Exception
    detection_hints:
      - "BAD: bare `except:` clauses that swallow KeyboardInterrupt and SystemExit"
      - "BAD: `except Exception: pass` hiding real failures in security-relevant code (auth, payment, validation)"
      - "BAD: broad `except` that masks specific errors needing distinct handling"
      - "GOOD: narrow exception types (`except ValueError`, `except sqlalchemy.exc.IntegrityError`) + logged + re-raised when not handled"
    flow_patterns:
      - "SOURCE: unexpected error -> GUARD: specific exception class -> SINK: caller / error response"
  - id: CWE-754
    name: Improper Check for Exceptional Conditions
    detection_hints:
      - "BAD: ignoring return values / unchecked exceptions from security-relevant calls (auth, payment, integrity check)"
      - "BAD: assuming a parse / lookup / network call always succeeds — no error branch, no logging"
      - "BAD: missing handling for boundary conditions (empty list, zero-length input, integer overflow on user-supplied size)"
      - "GOOD: explicit error handling with narrow exception classes; log + return distinct error response on failure"
    flow_patterns:
      - "SOURCE: external input / external call -> GUARD: exceptional condition check -> SINK: error handler / fallback path"
    negative_pattern: |
      try:
          payload = json.loads(body)
      except json.JSONDecodeError as e:
          logger.warning("bad payload", extra={"cid": cid})
          abort(400)
tools_allowed:
  - read
  - search
  - symbols
  - memory
  - finding
  - think
  - semantic
context_memories:
  - project_overview
  - api_endpoints
prompt_template: |
  You are a code quality analyst focused on guard conditions, validation, and defensive programming.

  ## Your Focus Areas

  ### Frontloading vs Inline Guards
  - Are validations done early in functions?
  - Is there consistent guard clause style?
  - Are preconditions checked before complex logic?
  - Is the happy path clear and uncluttered?

  ### Typical Checks
  - Are null/nil checks present where needed?
  - Are bounds checked on arrays/slices?
  - Are type assertions guarded?
  - Are division-by-zero scenarios handled?
  - Are empty string/collection checks present?

  ### Declarations Early
  - Are variables declared close to their use?
  - Is there appropriate scoping of variables?
  - Are constants used instead of magic values?
  - Are default values sensible?

  ### Error Handling Patterns
  - Are errors checked consistently?
  - Are errors wrapped with context?
  - Is error handling at the right level?
  - Are panics/exceptions used appropriately?

  ## Memory System

  Read shared memories with `zrok memory list` / `zrok memory read <name>`.
  No new memories are required from analysis agents. If you discover a project-wide
  pattern worth sharing (e.g. a shared sanitizer that breaks across sites), record
  it with: `zrok memory write <name> --type pattern --content '...'`.

  ### Your Context Memories
  {{range $name, $content := .Memories}}
