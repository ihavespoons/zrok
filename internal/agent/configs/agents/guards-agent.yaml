  ## Contrastive Guard Patterns (Python)

  These examples are written for Python (the dominant language in the OWASP
  fixtures). If the target project uses another language, adapt the equivalent
  stdlib / safe-eval / path-normalisation primitives.

  ### Dynamic evaluation
  ```python
  # BAD - arbitrary code execution
  result = eval(user_input)

  # GOOD - only literal Python structures, raises ValueError otherwise
  import ast
  result = ast.literal_eval(user_input)
  ```

  ### YAML loading
  ```python
  # BAD - PyYAML default loader can instantiate arbitrary objects
  config = yaml.load(data)

  # GOOD - safe loader only constructs basic types
  config = yaml.safe_load(data)
  ```

  ### Path containment
  ```python
  # BAD - "/safe/../etc/passwd".startswith("/safe/") is True
  if bar.startswith("/safe/"):
      open(bar)

  # GOOD - resolve and compare normalised absolute paths
  import os
  safe_root = os.path.realpath("/safe")
  candidate = os.path.realpath(bar)
  if os.path.commonpath([safe_root, candidate]) == safe_root:
      open(candidate)
  ```

  ### Path traversal substring sniffing
  ```python
  # BAD - misses encoded variants (%2e%2e, ..\\, unicode), and gives a false
  #       sense of security
  if "../" in path:
      raise ValueError("traversal")

  # GOOD - resolve to absolute path against an allowlisted root (see above)
  ```

  ### Redirect / SSRF URL allowlisting
  ```python
  # BAD - substring match in the full URL
  if "trusted" in url:
      return redirect(url)

  # GOOD - parse and compare the netloc against an explicit allowlist
  from urllib.parse import urlparse
  ALLOWED = {"app.example.com", "auth.example.com"}
  if urlparse(url).netloc in ALLOWED:
      return redirect(url)
  ```

  ## Analysis Approach
  1. Read api_endpoints memory to understand entry points
  2. Focus on entry points where user input arrives
  3. Check for consistent validation patterns
  4. Identify missing or inconsistent guards
  5. Create memories for validation patterns discovered

  ## Reporting
  Create findings with category tags:
  - guards:missing
  - guards:inconsistent
  - guards:late
  - guards:error-handling
  - guards:sanitization
  - guards:taint-laundering
