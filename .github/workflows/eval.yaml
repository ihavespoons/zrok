name: Evaluation

on:
  # Manual trigger for baseline generation
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'compare'
        type: choice
        options:
          - compare
          - baseline
      fixture:
        description: 'Fixture to evaluate'
        required: true
        default: 'owasp'
        type: choice
        options:
          - owasp
          - vulnerable-app
      num_runs:
        description: 'Number of runs (baseline mode only)'
        required: false
        default: '10'
        type: string

  # Run comparison on PRs to main
  pull_request:
    branches: [main]

jobs:
  eval-compare:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'compare')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build zrok
        run: go build -o zrok .

      - name: Determine fixture
        id: fixture
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.fixture }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=owasp" >> "$GITHUB_OUTPUT"
          fi

      - name: Check baseline exists
        run: |
          BASELINE="eval/baseline-${{ steps.fixture.outputs.name }}.json"
          if [ ! -f "$BASELINE" ]; then
            echo "::error::No ${BASELINE} found. Generate one first with workflow_dispatch in baseline mode."
            exit 1
          fi

      - name: Prepare OWASP subset
        if: steps.fixture.outputs.name == 'owasp'
        run: |
          eval/fixtures/owasp-subset/create-subset.sh
          eval/generate-owasp-ground-truth.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCode
        run: npm install -g opencode-ai@latest

      - name: Run evaluation (compare mode)
        id: eval
        env:
          # OpenCode reads OPENROUTER_API_KEY from env and uses its built-in
          # OpenRouter provider. The model defaults in run.sh to the same
          # one the dogfood workflow uses, so eval scores reflect production.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCODE_MODEL: ${{ vars.EVAL_MODEL || 'openrouter/deepseek/deepseek-v4-flash' }}
          EVAL_PROFILE: ${{ vars.EVAL_PROFILE || 'fast' }}
        run: |
          set +e
          ./eval/run.sh --fixture ${{ steps.fixture.outputs.name }} --compare
          EXIT_CODE=$?
          # Exit 2 = quota limits exhausted (still surface as workflow failure
          # so we don't silently ignore the regression like the prior pipeline
          # did). Exit 3 = zero-findings guard tripped. Anything non-zero now
          # fails the workflow — the old "exit 0 on quota" path is gone.
          case $EXIT_CODE in
            0) ;;
            2) echo "::error::Evaluation aborted: provider quota/rate-limit exhausted after retries. Re-run when quota resets." ;;
            3) echo "::error::Evaluation broken: at least one run produced 0 findings against a known-vulnerable fixture. Check OPENROUTER_API_KEY, model availability, and orchestrator output." ;;
            *) echo "::error::Evaluation failed with exit code $EXIT_CODE" ;;
          esac
          exit $EXIT_CODE

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ steps.fixture.outputs.name }}
          path: eval/results/

  eval-baseline:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build zrok
        run: go build -o zrok .

      - name: Prepare OWASP subset
        if: github.event.inputs.fixture == 'owasp'
        run: |
          eval/fixtures/owasp-subset/create-subset.sh
          eval/generate-owasp-ground-truth.sh

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenCode
        run: npm install -g opencode-ai@latest

      - name: Run baseline evaluation
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENCODE_MODEL: ${{ vars.EVAL_MODEL || 'openrouter/deepseek/deepseek-v4-flash' }}
          EVAL_PROFILE: ${{ vars.EVAL_PROFILE || 'fast' }}
        run: |
          set +e
          ./eval/run.sh -n ${{ github.event.inputs.num_runs }} --fixture ${{ github.event.inputs.fixture }} --baseline
          EXIT_CODE=$?
          case $EXIT_CODE in
            0) ;;
            2) echo "::error::Baseline aborted: provider quota/rate-limit exhausted. Partial results in artifacts." ;;
            3) echo "::error::Baseline aborted: at least one run produced 0 findings — pipeline broken, refusing to write baseline that masks the failure." ;;
            *) echo "::error::Baseline failed with exit code $EXIT_CODE" ;;
          esac
          exit $EXIT_CODE

      - name: Upload baseline and results
        uses: actions/upload-artifact@v4
        with:
          name: eval-baseline-${{ github.event.inputs.fixture }}
          path: |
            eval/baseline-*.json
            eval/results/

      - name: Commit baseline
        run: |
          BASELINE="eval/baseline-${{ github.event.inputs.fixture }}.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$BASELINE"
          git commit -m "Update ${{ github.event.inputs.fixture }} evaluation baseline from ${{ github.event.inputs.num_runs }} runs" || echo "No changes to commit"
          git push
