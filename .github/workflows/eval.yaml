name: Evaluation

on:
  # Manual trigger for baseline generation
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'compare'
        type: choice
        options:
          - compare
          - baseline
      fixture:
        description: 'Fixture to evaluate'
        required: true
        default: 'owasp'
        type: choice
        options:
          - owasp
          - vulnerable-app
      num_runs:
        description: 'Number of runs (baseline mode only)'
        required: false
        default: '10'
        type: string

  # Run comparison on PRs to main
  pull_request:
    branches: [main]

jobs:
  eval-compare:
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'compare')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build zrok
        run: go build -o zrok .

      - name: Determine fixture
        id: fixture
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.fixture }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=owasp" >> "$GITHUB_OUTPUT"
          fi

      - name: Check baseline exists
        run: |
          BASELINE="eval/baseline-${{ steps.fixture.outputs.name }}.json"
          if [ ! -f "$BASELINE" ]; then
            echo "::error::No ${BASELINE} found. Generate one first with workflow_dispatch in baseline mode."
            exit 1
          fi

      - name: Prepare OWASP subset
        if: steps.fixture.outputs.name == 'owasp'
        run: |
          eval/fixtures/owasp-subset/create-subset.sh
          eval/generate-owasp-ground-truth.sh

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run evaluation (compare mode)
        id: eval
        env:
          # Uses Claude Max subscription via OAuth token (run `claude setup-token` locally)
          # Falls back to API key if OAuth token not set
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          ./eval/run.sh --fixture ${{ steps.fixture.outputs.name }} --compare
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 2 ]; then
            echo "::warning::Evaluation skipped due to Claude API quota limits. This is not a code regression."
            echo "quota_exceeded=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          exit $EXIT_CODE

      - name: Comment on PR about quota
        if: steps.eval.outputs.quota_exceeded == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **Evaluation skipped** — Claude API quota was exceeded. This is not a code regression. Re-run the workflow once quota resets.'
            })

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ steps.fixture.outputs.name }}
          path: eval/results/

  eval-baseline:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'baseline'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build zrok
        run: go build -o zrok .

      - name: Prepare OWASP subset
        if: github.event.inputs.fixture == 'owasp'
        run: |
          eval/fixtures/owasp-subset/create-subset.sh
          eval/generate-owasp-ground-truth.sh

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run baseline evaluation
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          ./eval/run.sh -n ${{ github.event.inputs.num_runs }} --fixture ${{ github.event.inputs.fixture }} --baseline
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 2 ]; then
            echo "::error::Baseline generation stopped early due to Claude API quota limits. Partial results may be available in artifacts."
            exit 1
          fi
          exit $EXIT_CODE

      - name: Upload baseline and results
        uses: actions/upload-artifact@v4
        with:
          name: eval-baseline-${{ github.event.inputs.fixture }}
          path: |
            eval/baseline-*.json
            eval/results/

      - name: Commit baseline
        run: |
          BASELINE="eval/baseline-${{ github.event.inputs.fixture }}.json"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$BASELINE"
          git commit -m "Update ${{ github.event.inputs.fixture }} evaluation baseline from ${{ github.event.inputs.num_runs }} runs" || echo "No changes to commit"
          git push
