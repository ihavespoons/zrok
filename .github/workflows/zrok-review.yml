# Dogfood: review every PR to zrok using zrok itself, via the
# diffsec/zrok-review-action composite action. The action builds zrok from
# the PR's own branch (head_ref) — so if the PR breaks the review
# pipeline, it breaks its own review and that signal surfaces immediately.
#
# Advisory-only at first (block-on empty). Promote to block-on: critical
# once we trust the LLM agents enough not to false-positive a stop-the-PR
# verdict.
#
# Fork PRs are skipped — secrets aren't exposed to pull_request runs from
# forks anyway, and we'd rather skip-with-warning than fail noisily.

name: zrok security review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write       # post the review comment
  security-events: write     # upload SARIF to code-scanning

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # action needs the base ref for `git diff`

      - uses: diffsec/zrok-review-action@main
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # Z.AI Coding Plan — GLM-5.1. The coding-plan endpoint differs
          # from standard z.ai, so we define it as a custom provider here
          # rather than relying on a committed opencode.json.
          opencode-env: |
            ZAI_API_KEY=${{ secrets.ZAI_API_KEY }}
          opencode-config: |
            {
              "$schema": "https://opencode.ai/config.json",
              "provider": {
                "zai": {
                  "npm": "@ai-sdk/openai-compatible",
                  "name": "Z.AI Coding Plan",
                  "options": {
                    "baseURL": "https://api.z.ai/api/coding/paas/v4",
                    "apiKey": "{env:ZAI_API_KEY}"
                  },
                  "models": {
                    "glm-5.1": { "name": "GLM-5.1" },
                    "glm-5-turbo": { "name": "GLM-5-Turbo" },
                    "glm-4.7": { "name": "GLM-4.7" }
                  }
                }
              }
            }
          model: zai/glm-5.1
          # Dogfood: review with the PR's own zrok code. If a PR breaks
          # the review pipeline, the review breaks visibly, which is the
          # signal we want.
          zrok-ref: ${{ github.head_ref }}
          severity-threshold: high
          block-on: ''       # advisory only — promote later
