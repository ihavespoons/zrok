# Ground truth for the vulnerable Flask application.
# Each entry defines a known vulnerability that quokka should detect.
# Used by the eval scorer to calculate detection rate and accuracy.

vulnerabilities:
  - id: "VULN-01"
    title: "Hardcoded secret key"
    severity: high
    cwe: "CWE-798"
    file: "app.py"
    line_start: 12
    tags: ["secrets", "hardcoded-credentials"]
    description: "Flask secret_key is hardcoded in source code"

  - id: "VULN-02"
    title: "Hardcoded database credentials"
