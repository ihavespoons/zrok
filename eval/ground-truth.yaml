# Scoring weights - critical findings matter more
severity_weights:
  critical: 5
  high: 3
  medium: 2
  low: 1
  info: 0

# Matching configuration
matching:
  # How close a finding's line number must be to match ground truth
  line_tolerance: 15
  # CWE matching considers CWE hierarchy (e.g., CWE-89 matches CWE-89)
  cwe_exact_match: true
  # Minimum similarity for title matching (0.0 to 1.0)
  title_similarity_threshold: 0.3
